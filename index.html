<script>
const STORE='diet-dashboard-v4';const byName=n=>workbook.sheets.find(s=>s.name===n);const dash=byName('Pannello di controllo'), pesoSheet=byName('Tabella peso'), cut=byName('Previsione Cut');const txt=(s,r,c)=>s?.rows?.[r]?.[c]?.text||'';const val=(s,r,c)=>s?.rows?.[r]?.[c]?.value;const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));const num=v=>{const n=parseFloat(String(v??'').replace('%','').replace(',','.'));return Number.isFinite(n)?n:null};const fmt=(n,d=1)=>Number.isFinite(num(n))?num(n).toLocaleString('it-IT',{maximumFractionDigits:d,minimumFractionDigits:d}):'--';const today=()=>new Date().toISOString().slice(0,10);function toIso(s){const m=String(s||'').match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(!m)return s;const y=m[3].length===2?'20'+m[3]:m[3];return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`}function c(r,col){return dash?.rows?.[r]?.[col]?.text||''}
function phasePlan(){return [1,2,3].map(r=>({phase:c(r,4),start:c(r,5),end:c(r,6),kcal:c(r,7),delta:c(r,8),note:c(r,9)})).filter(x=>x.phase)}function cycleRows(){return (dash?.rows||[]).slice(15,39).map(r=>({date:toIso(r[0]?.text),week:r[1]?.text,phase:r[2]?.text,kcal:r[3]?.text,cycle:r[4]?.text})).filter(x=>x.date)}
function excelMeasures(){const cols=[13,14,15];return cols.map(col=>({source:'Excel',date:toIso(c(3,col)),weight:c(4,col),neck:c(5,col),shoulders:c(6,col),chest:c(7,col),armRelaxed:c(8,col),arm:c(9,col),forearm:c(10,col),wrist:c(11,col),waist:c(12,col),hips:c(13,col),thigh:c(14,col),ankle:c(15,col),calf:c(16,col),constitution:c(17,col),bmi:c(18,col),whr:c(19,col),wht:c(20,col),idealWeight:c(21,col),pectoral:c(27,col),axillary:c(28,col),triceps:c(29,col),subscap:c(30,col),supra:c(31,col),abskin:c(32,col),thighSkin:c(33,col),skinSum:c(34,col)||c(34,col+4),weight2:c(35,col)||c(35,col+4),weightChange:c(36,col)||c(36,col+4),leanMass:c(37,col)||c(37,col+4),bfPlic:c(38,col)||c(38,col+4)})).filter(x=>x.date)}
const importedMeasures=excelMeasures();const defaults={profile:{sex:txt(cut,2,0)||'Donna',height:c(0,13)||178,age:c(1,13)||31,phase:c(1,1)||'Lean Bulk - Step 1',kcal:c(2,1)||2350,protein:c(3,1)||125,carbs:c(4,1)||287,fats:c(5,1)||78,lastCycle:c(11,4)||'22/05/2026'},log:[],measures:importedMeasures};let state=load();function load(){try{const raw=localStorage.getItem(STORE)||localStorage.getItem('diet-dashboard-v2')||localStorage.getItem('diet-dashboard-v3')||'{}';const saved=JSON.parse(raw);const merged=merge(defaults,saved);merged.measures=mergeImported(merged.measures||[],importedMeasures);return merged}catch{return structuredClone(defaults)}}function merge(a,b){const out=structuredClone(a);for(const k in b){out[k]=Array.isArray(b[k])?b[k]:(typeof b[k]==='object'&&b[k]?merge(out[k]||{},b[k]):b[k])}return out}function mergeImported(current,imported){const map=new Map(current.map(r=>[r.date,r]));for(const r of imported)if(!map.has(r.date))map.set(r.date,r);return Array.from(map.values()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))}function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function latestMeasure(){return state.measures.at(-1)||{}}function avg(a,k){const xs=a.map(x=>num(x[k])).filter(Number.isFinite);return xs.length?xs.reduce((s,x)=>s+x,0)/xs.length:null}function skinSum(r){const s=['pectoral','axillary','triceps','subscap','supra','abskin','thighSkin'].map(k=>num(r[k])).filter(Number.isFinite).reduce((a,b)=>a+b,0);return s||num(r.skinSum)}function fatMass(r){const w=num(r.weight||r.weight2),bf=num(r.bfPlic);return w&&bf?w*bf/100:null}function weightPoints(){const fromExcel=(pesoSheet?.rows||[]).slice(1).map(r=>({x:r[0]?.text,y:num(r[1]?.text)})).filter(p=>p.x&&p.y!==null);const fromMeasures=state.measures.map(r=>({x:r.date,y:num(r.weight)})).filter(p=>p.y!==null);const fromLog=state.log.map(r=>({x:r.date,y:num(r.weight)})).filter(p=>p.y!==null);return [...fromExcel,...fromMeasures,...fromLog]}
document.getElementById('sourceLine').textContent='Athlete Lab / Cyber Nutrition - fonte: '+workbook.sourceFile.split('\\').pop();document.getElementById('exportedAt').textContent=workbook.exportedAt;
function dashboard(){const p=state.profile,m=latestMeasure(),plan=phasePlan();document.getElementById('view-dashboard').innerHTML=`<div class="hero"><div class="command"><span class="eyebrow">CONTROL ROOM</span><h2>${esc(p.phase)}</h2><div class="mega">${fmt(p.kcal,0)} kcal</div><p class="sub">${esc(c(9,0).replace('Focus:','').trim()||'Dashboard operativa basata sul tuo Excel, con storico e dati modificabili.')}</p></div><div class="panel"><h2>Snapshot corpo</h2><div class="metrics" style="grid-template-columns:1fr 1fr"><div class="metric accent"><span>Peso</span><strong>${fmt(m.weight,1)} kg</strong></div><div class="metric cyan"><span>BF plicometro</span><strong>${fmt(m.bfPlic,1)}%</strong></div><div class="metric"><span>Massa magra</span><strong>${fmt(m.leanMass,1)} kg</strong></div><div class="metric"><span>Massa grassa</span><strong>${fmt(fatMass(m),1)} kg</strong></div></div></div></div><div class="metrics"><div class="metric accent"><span>Proteine</span><strong>${fmt(p.protein,0)} g</strong></div><div class="metric"><span>Carboidrati</span><strong>${fmt(p.carbs,0)} g</strong></div><div class="metric"><span>Grassi</span><strong>${fmt(p.fats,0)} g</strong></div><div class="metric cyan"><span>Misurazioni</span><strong>${state.measures.length}</strong></div></div><div class="grid-two"><div class="panel"><div class="section-head"><div><h2>Impostazioni attive</h2><p>Qui il tasto salva ora aggiorna dashboard e memoria locale.</p></div></div>${profileForm()}</div><div class="panel"><h2>Roadmap nutrizionale Excel</h2>${phaseTable(plan)}</div></div><div class="section grid-two"><div class="panel"><h2>Storico peso</h2><canvas id="dashWeight"></canvas></div><div class="panel"><h2>Ultimi check-in</h2>${quickHistory()}</div></div>`;bindProfile();drawLine('dashWeight',weightPoints(),'#65e8ff','Peso kg')}
function profileForm(){const p=state.profile,phases=phasePlan();const options=phases.map(x=>`<option value="${esc(x.phase)}" ${x.phase===p.phase?'selected':''}>${esc(x.phase)}</option>`).join('');return `<div class="form-grid"><div class="field"><label>Sesso</label><select id="profile-sex"><option ${p.sex==='Donna'?'selected':''}>Donna</option><option ${p.sex==='Uomo'?'selected':''}>Uomo</option></select></div><div class="field"><label>Altezza</label><input id="profile-height" value="${esc(p.height)}"></div><div class="field"><label>Eta</label><input id="profile-age" value="${esc(p.age)}"></div><div class="field"><label>Fase</label><select id="profile-phase">${options}</select></div><div class="field"><label>Kcal</label><input id="profile-kcal" value="${esc(p.kcal)}"></div><div class="field"><label>Proteine</label><input id="profile-protein" value="${esc(p.protein)}"></div><div class="field"><label>Carboidrati</label><input id="profile-carbs" value="${esc(p.carbs)}"></div><div class="field"><label>Grassi</label><input id="profile-fats" value="${esc(p.fats)}"></div></div><div class="actions"><button class="btn primary" id="save-profile">Salva impostazioni</button><span id="save-note" class="save-note"></span></div>`}
function bindProfile(){const phaseSelect=gid('profile-phase');phaseSelect.onchange=()=>{const selected=phasePlan().find(x=>x.phase===phaseSelect.value);if(selected)gid('profile-kcal').value=selected.kcal};document.getElementById('save-profile').onclick=()=>{state.profile={sex:gid('profile-sex').value,height:gid('profile-height').value,age:gid('profile-age').value,phase:gid('profile-phase').value,kcal:gid('profile-kcal').value,protein:gid('profile-protein').value,carbs:gid('profile-carbs').value,fats:gid('profile-fats').value,lastCycle:state.profile.lastCycle};save();dashboard();document.getElementById('save-note').textContent='Salvato'} }function gid(id){return document.getElementById(id)}
function phaseTable(rows){return `<div class="phase-card"><b>Fase</b><b>Inizio</b><b>Fine</b><b>Kcal</b><b>Obiettivo</b></div>${rows.map(r=>`<div class="phase-card"><span>${esc(r.phase)}</span><span>${esc(r.start)}</span><span>${esc(r.end)}</span><span>${esc(r.kcal)}</span><span class="mini">${esc(r.note)}</span></div>`).join('')}`}
function quickHistory(){return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Peso</th><th>BF</th><th>LBM</th><th>Vita</th></tr></thead><tbody>${state.measures.slice(-5).map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${esc(r.bfPlic||fmt(bodyFat(r),1))}</td><td>${esc(r.leanMass)}</td><td>${esc(r.waist)}</td></tr>`).join('')}</tbody></table></div>`}
function registro(){document.getElementById('view-registro').innerHTML=`<div class="section"><div class="section-head"><div><h2>Registro alimentazione</h2><p>Inserisci solo cio' che serve per leggere oscillazione e salita del peso.</p></div></div><div class="panel">${logForm()}</div></div><div class="section grid-two"><div class="panel"><canvas id="weightChart"></canvas></div><div class="panel"><canvas id="kcalChart"></canvas></div></div><div class="section"><h2>Storico giornaliero</h2>${logTable()}</div>`;bindLog();drawLine('weightChart',weightPoints(),'#65e8ff','Peso kg');drawLine('kcalChart',state.log.map(r=>({x:r.date,y:num(r.kcal)})).filter(p=>p.y!==null),'#86f7ff','Kcal')}
function logForm(){return `<div class="form-grid"><div class="field"><label>Data</label><input id="log-date" type="date" value="${today()}"></div><div class="field"><label>Peso kg</label><input id="log-weight" type="number" step="0.1"></div><div class="field"><label>Kcal</label><input id="log-kcal" type="number"></div></div><div class="actions"><button class="btn primary" id="add-log">Aggiungi giornata</button></div>`}
function bindLog(){gid('add-log').onclick=()=>{state.log.push({date:gid('log-date').value||today(),weight:gid('log-weight').value,kcal:gid('log-kcal').value});state.log.sort((a,b)=>a.date.localeCompare(b.date));save();render()};document.querySelectorAll('[data-del-log]').forEach(b=>b.onclick=()=>{state.log.splice(Number(b.dataset.delLog),1);save();render()})}
function logTable(){if(!state.log.length)return '<div class="empty">Ancora nessuna giornata inserita.</div>';return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Peso</th><th>Kcal</th><th></th></tr></thead><tbody>${state.log.map((r,i)=>`<tr><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${esc(r.kcal)}</td><td><button class="btn danger small" data-del-log="${i}">Elimina</button></td></tr>`).join('')}</tbody></table></div>`}
function ciclo(){const rows=cycleRows(),now=today(),next=rows.find(r=>r.date>=now)||rows[0];document.getElementById('view-ciclo').innerHTML=`<div class="section"><div class="hero"><div class="command"><span class="eyebrow">CYCLE MAP</span><h2>Ultimo ciclo: ${esc(state.profile.lastCycle)}</h2><div class="mega">${esc(next?.cycle||'--')}</div><p class="sub">Prossima data in calendario: ${esc(next?.date||'--')} - settimana ${esc(next?.week||'--')}.</p></div><div class="panel"><h2>Previsioni prossime fasi</h2>${cycleMini(rows.filter(r=>r.date>=now).slice(0,6))}</div></div></div><div class="section"><h2>Calendario ciclo + dieta</h2><div class="panel timeline">${rows.map(r=>cycleRow(r,r.date===next?.date)).join('')}</div></div>`}
function cycleMini(rows){return `<div class="timeline">${rows.map(r=>cycleRow(r,false)).join('')}</div>`}function cycleNote(label){const x=String(label||'').toLowerCase();if(x.includes('luteale'))return 'Possibile stanchezza, fame piu alta, ritenzione e performance meno lineare.';if(x.includes('mestruale'))return 'Energia variabile: meglio ascoltare carichi, recupero e sintomi.';if(x.includes('follicolare'))return 'Di solito energia in salita: buona fase per spingere tecnica e volume.';if(x.includes('ovulazione'))return 'Possibile picco di energia, ma occhio a stress articolare e recupero.';return 'Monitora energia, fame, sonno e qualita allenamento.'}function cycleRow(r,isNext){return `<div class="time-row ${isNext?'next':''}"><b>${esc(r.date)}</b><span>Settimana ${esc(r.week)}</span><span>${esc(r.phase)}</span><span>${esc(r.kcal)} kcal</span><span>${esc(r.cycle)}</span><span class="mini">${esc(cycleNote(r.cycle))}</span></div>`}
function circonferenze(){document.getElementById('view-circonferenze').innerHTML=`<div class="section"><div class="section-head"><div><h2>Circonferenze</h2><p>Storico Excel importato + nuove misurazioni modificabili.</p></div></div><div class="panel">${measureForm()}</div></div><div class="section"><h2>Storico circonferenze</h2>${circTable()}</div>`;bindMeasures()}
function measureForm(){return `<div class="form-grid"><div class="field"><label>Data</label><input id="m-date" type="date" value="${today()}"></div><div class="field"><label>Peso</label><input id="m-weight"></div><div class="field"><label>Collo</label><input id="m-neck"></div><div class="field"><label>Spalle</label><input id="m-shoulders"></div><div class="field"><label>Torace</label><input id="m-chest"></div><div class="field"><label>Bicipite rilassato</label><input id="m-armRelaxed"></div><div class="field"><label>Bicipite contratto</label><input id="m-arm"></div><div class="field"><label>Avambraccio</label><input id="m-forearm"></div><div class="field"><label>Polso</label><input id="m-wrist"></div><div class="field"><label>Vita</label><input id="m-waist"></div><div class="field"><label>Fianchi</label><input id="m-hips"></div><div class="field"><label>Coscia</label><input id="m-thigh"></div><div class="field"><label>Caviglia</label><input id="m-ankle"></div><div class="field"><label>Polpaccio</label><input id="m-calf"></div></div><div class="actions"><button class="btn primary" id="add-measure">Aggiungi misure</button></div>`}
function bindMeasures(){const btn=gid('add-measure');if(!btn)return;btn.onclick=()=>{state.measures.push({source:'App',date:gid('m-date').value||today(),weight:gid('m-weight').value,neck:gid('m-neck').value,shoulders:gid('m-shoulders').value,chest:gid('m-chest').value,armRelaxed:gid('m-armRelaxed').value,arm:gid('m-arm').value,forearm:gid('m-forearm').value,wrist:gid('m-wrist').value,waist:gid('m-waist').value,hips:gid('m-hips').value,thigh:gid('m-thigh').value,ankle:gid('m-ankle').value,calf:gid('m-calf').value});state.measures.sort((a,b)=>a.date.localeCompare(b.date));save();render()};document.querySelectorAll('[data-del-measure]').forEach(b=>b.onclick=()=>{state.measures.splice(Number(b.dataset.delMeasure),1);save();render()})}
function circTable(){return `<div class="table-wrap"><table><thead><tr><th>Fonte</th><th>Data</th><th>Peso</th><th>Collo</th><th>Spalle</th><th>Torace</th><th>Bic. ril.</th><th>Bic. contr.</th><th>Avambraccio</th><th>Polso</th><th>Vita</th><th>Fianchi</th><th>Coscia</th><th>Caviglia</th><th>Polpaccio</th><th></th></tr></thead><tbody>${state.measures.map((r,i)=>`<tr><td>${esc(r.source||'App')}</td><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${esc(r.neck)}</td><td>${esc(r.shoulders)}</td><td>${esc(r.chest)}</td><td>${esc(r.armRelaxed)}</td><td>${esc(r.arm)}</td><td>${esc(r.forearm)}</td><td>${esc(r.wrist)}</td><td>${esc(r.waist)}</td><td>${esc(r.hips)}</td><td>${esc(r.thigh)}</td><td>${esc(r.ankle)}</td><td>${esc(r.calf)}</td><td><button class="btn danger small" data-del-measure="${i}">Elimina</button></td></tr>`).join('')}</tbody></table></div>`}
function pliche(){document.getElementById('view-pliche').innerHTML=`<div class="section"><div class="section-head"><div><h2>Pliche</h2><p>Dati plicometrici del tuo Excel con inserimento manuale completo.</p></div></div><div class="panel">${skinForm()}</div></div><div class="section grid-two"><div class="panel"><h2>Somma pliche</h2><canvas id="skinChart"></canvas></div><div class="panel"><h2>Composizione</h2><canvas id="bfChart"></canvas></div></div><div class="section"><h2>Storico pliche</h2>${skinTable()}</div>`;bindSkin();drawLine('skinChart',state.measures.map(r=>({x:r.date,y:skinSum(r)})).filter(p=>p.y!==null),'#65e8ff','Somma pliche mm');drawLine('bfChart',state.measures.map(r=>({x:r.date,y:num(r.bfPlic||bodyFat(r))})).filter(p=>p.y!==null),'#86f7ff','BF %')}
function skinForm(){return `<div class="form-grid"><div class="field"><label>Data</label><input id="skin-date" type="date" value="${today()}"></div><div class="field"><label>Peso</label><input id="skin-weight" type="number" step="0.1"></div><div class="field"><label>Pettorale</label><input id="skin-pectoral" type="number" step="0.1"></div><div class="field"><label>Ascellare media</label><input id="skin-axillary" type="number" step="0.1"></div><div class="field"><label>Tricipitale</label><input id="skin-triceps" type="number" step="0.1"></div><div class="field"><label>Sottoscapolare</label><input id="skin-subscap" type="number" step="0.1"></div><div class="field"><label>Soprailiaca</label><input id="skin-supra" type="number" step="0.1"></div><div class="field"><label>Addominale</label><input id="skin-abskin" type="number" step="0.1"></div><div class="field"><label>Coscia</label><input id="skin-thighSkin" type="number" step="0.1"></div><div class="field"><label>Somma pliche</label><input id="skin-sum" readonly></div><div class="field"><label>BF plicometro %</label><input id="skin-bfPlic" readonly></div><div class="field"><label>Massa magra kg</label><input id="skin-leanMass" readonly></div></div><div class="actions"><button class="btn primary" id="add-skin">Aggiungi pliche</button><span class="mini">BF e massa magra vengono calcolate con la formula del tuo Excel.</span></div>`}
function calcSkinBf(sum){const age=num(state.profile.age);if(!sum||!age)return null;const density=1.097-(0.00046971*sum)+(0.00000056*(sum*sum))-(0.00012828*age);return density?((4.95/density)-4.5)*100:null}
function calcLeanMass(weight,bf){const w=num(weight),b=num(bf);return w&&Number.isFinite(b)?w-(w*(b/100)):null}
function skinDraft(){return {weight:gid('skin-weight').value,pectoral:gid('skin-pectoral').value,axillary:gid('skin-axillary').value,triceps:gid('skin-triceps').value,subscap:gid('skin-subscap').value,supra:gid('skin-supra').value,abskin:gid('skin-abskin').value,thighSkin:gid('skin-thighSkin').value}}
function updateSkinAuto(){const draft=skinDraft(),sum=skinSum(draft),bf=calcSkinBf(sum),lbm=calcLeanMass(draft.weight,bf);gid('skin-sum').value=Number.isFinite(sum)?fmt(sum,1):'';gid('skin-bfPlic').value=Number.isFinite(bf)?fmt(bf,1):'';gid('skin-leanMass').value=Number.isFinite(lbm)?fmt(lbm,1):''}
function bindSkin(){const btn=gid('add-skin');if(!btn)return;['skin-weight','skin-pectoral','skin-axillary','skin-triceps','skin-subscap','skin-supra','skin-abskin','skin-thighSkin'].forEach(id=>gid(id).oninput=updateSkinAuto);updateSkinAuto();btn.onclick=()=>{const date=gid('skin-date').value||today();const existing=state.measures.find(r=>r.date===date);const row=existing||{source:'App',date};const draft=skinDraft(),sum=skinSum(draft),bf=calcSkinBf(sum),lbm=calcLeanMass(draft.weight,bf);Object.assign(row,{source:row.source||'App',weight:draft.weight||row.weight,pectoral:draft.pectoral,axillary:draft.axillary,triceps:draft.triceps,subscap:draft.subscap,supra:draft.supra,abskin:draft.abskin,thighSkin:draft.thighSkin,skinSum:Number.isFinite(sum)?fmt(sum,1):'',bfPlic:Number.isFinite(bf)?fmt(bf,1):'',leanMass:Number.isFinite(lbm)?fmt(lbm,1):''});if(!existing)state.measures.push(row);state.measures.sort((a,b)=>a.date.localeCompare(b.date));save();render()}}
function skinTable(){return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Pettorale</th><th>Ascellare</th><th>Tricipitale</th><th>Sottoscapolare</th><th>Soprailiaca</th><th>Addominale</th><th>Coscia</th><th>Somma</th><th>BF plic.</th><th>LBM</th><th>FM</th></tr></thead><tbody>${state.measures.map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.pectoral)}</td><td>${esc(r.axillary)}</td><td>${esc(r.triceps)}</td><td>${esc(r.subscap)}</td><td>${esc(r.supra)}</td><td>${esc(r.abskin)}</td><td>${esc(r.thighSkin)}</td><td>${fmt(skinSum(r),1)}</td><td>${esc(r.bfPlic)}</td><td>${esc(r.leanMass)}</td><td>${fmt(fatMass(r),1)}</td></tr>`).join('')}</tbody></table></div>`}
function indicatori(){const m=latestMeasure();document.getElementById('view-indicatori').innerHTML=`<div class="section"><div class="metrics"><div class="metric accent"><span>BMI</span><strong>${esc(m.bmi||bmi(m))}</strong></div><div class="metric cyan"><span>WHR</span><strong>${esc(m.whr||whr(m))}</strong></div><div class="metric"><span>Vita/altezza</span><strong>${esc(m.wht||wht(m))}</strong></div><div class="metric"><span>Costituzione</span><strong>${esc(m.constitution)}</strong></div></div></div><div class="grid-two"><div class="panel"><h2>Composizione corporea</h2>${compositionTable()}</div><div class="panel"><h2>Tabelle interpretative dal tuo Excel</h2>${referenceTables()}</div></div>`}
function bmi(r){const h=num(state.profile.height)/100,w=num(r.weight);return h&&w?fmt(w/(h*h),2):''}function whr(r){const w=num(r.waist),h=num(r.hips);return w&&h?fmt(w/h,2):''}function wht(r){const w=num(r.waist),h=num(state.profile.height);return w&&h?fmt(w/h,2):''}function bodyFat(r){const toIn=x=>x/2.54,h=toIn(num(state.profile.height)),neck=toIn(num(r.neck)),waist=toIn(num(r.waist)),hips=toIn(num(r.hips));if(!h||!neck||!waist)return null;if(state.profile.sex==='Uomo'){const x=waist-neck;return x>0?86.01*Math.log10(x)-70.041*Math.log10(h)+36.76:null}const x=waist+hips-neck;return x>0?163.205*Math.log10(x)-97.684*Math.log10(h)-78.387:null}
function compositionTable(){return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Peso</th><th>BMI</th><th>WHR</th><th>WHtR</th><th>LBM</th><th>FM</th><th>BF%</th><th>Peso ideale</th></tr></thead><tbody>${state.measures.map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${esc(r.bmi||bmi(r))}</td><td>${esc(r.whr||whr(r))}</td><td>${esc(r.wht||wht(r))}</td><td>${esc(r.leanMass)}</td><td>${fmt(fatMass(r),1)}</td><td>${esc(r.bfPlic||fmt(bodyFat(r),1))}</td><td>${esc(r.idealWeight)}</td></tr>`).join('')}</tbody></table></div>`}
function referenceTables(){const rows=[['BMI normopeso','18,5 - 24,99'],['BF donna atletica','14 - 20%'],['BF donna fitness','21 - 24%'],['Rischio vita donna normale','< 80 cm'],['Rischio vita donna aumentato','80 - 88 cm'],['WHR donna ginoide','< 0,78'],['WHR donna armonioso','0,78 - 0,85']];return `<div class="table-wrap"><table><thead><tr><th>Indicatore</th><th>Range Excel</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</tbody></table></div>`}
function drawLine(id,pts,color,label){const cn=document.getElementById(id);if(!cn)return;const ctx=cn.getContext('2d'),ratio=window.devicePixelRatio||1,w=cn.clientWidth||500,h=280;cn.width=w*ratio;cn.height=h*ratio;ctx.scale(ratio,ratio);ctx.clearRect(0,0,w,h);ctx.fillStyle='#91a19c';ctx.font='12px Segoe UI';ctx.fillText(label||'',34,18);const clean=pts.filter(p=>Number.isFinite(p.y));if(!clean.length){ctx.fillText('Nessun dato',34,48);return}const ys=clean.map(p=>p.y),min=Math.min(...ys),max=Math.max(...ys),range=(max-min)||1,pad=36;ctx.strokeStyle='#26343a';for(let i=0;i<4;i++){const y=pad+i*(h-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();clean.forEach((p,i)=>{const x=pad+i*((w-pad*2)/Math.max(1,clean.length-1)),y=h-pad-((p.y-min)/range)*(h-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle=color;clean.forEach((p,i)=>{const x=pad+i*((w-pad*2)/Math.max(1,clean.length-1)),y=h-pad-((p.y-min)/range)*(h-pad*2);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()})}
function render(){dashboard();registro();ciclo();circonferenze();pliche();indicatori()}render();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hide'));document.getElementById('view-'+b.dataset.view).classList.remove('hide');setTimeout(render,20)});
</script>
</body>
</html>
