<script>
const byName=n=>workbook.sheets.find(s=>s.name===n);const txt=(s,r,c)=>s?.rows?.[r]?.[c]?.text||'';const val=(s,r,c)=>{const v=s?.rows?.[r]?.[c]?.value;return typeof v==='number'?v:parseFloat(String(v??'').replace(',','.'))};const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));const clean=n=>Number.isFinite(n)?n:null;const fmt=(n,d=1)=>Number.isFinite(n)?n.toLocaleString('it-IT',{maximumFractionDigits:d,minimumFractionDigits:d}):'--';
const dash=byName('Pannello di controllo'), peso=byName('Tabella peso'), bulk=byName('Previsione Bulk'), cut=byName('Previsione Cut');
document.getElementById('sourceLine').textContent='Fonte: '+workbook.sourceFile.split('\\').pop();document.getElementById('exportedAt').textContent=workbook.exportedAt;
function dashboard(){const phase=txt(dash,1,1)||'Fase attuale';const kcal=val(dash,2,1);const protein=val(dash,3,1);const carbs=val(dash,4,1);const fats=val(dash,5,1);const start=txt(dash,6,1);const end=txt(dash,7,1);const focus=(dash.rows.map(r=>r.map(c=>c.text).join(' ')).find(x=>x.startsWith('Focus:'))||'').replace('Focus:','').trim();const phases=dash.rows.slice(1,4).map(r=>({name:r[2]?.text,start:r[3]?.text,end:r[4]?.text,kcal:r[5]?.text,note:r[7]?.text})).filter(x=>x.name);document.getElementById('view-dashboard').innerHTML=`<div class="hero"><div class="status"><span class="pill">FASE CORRENTE</span><h2>${esc(phase)}</h2><div class="phase">${fmt(kcal,0)} kcal</div><p>${esc(focus||'Target e fase importati dal tuo file Excel.')}</p></div><div class="target"><h3>Macro target</h3><div class="big">${fmt(protein,0)}<span class="unit"> g proteine</span></div><p class="note">Carboidrati ${fmt(carbs,0)} g - Grassi ${fmt(fats,0)} g</p><p class="note">Fase: ${esc(start||'--')} - ${esc(end||'--')}</p></div></div><div class="metrics"><div class="metric"><span>Calorie</span><strong>${fmt(kcal,0)}</strong></div><div class="metric"><span>Proteine</span><strong>${fmt(protein,0)} g</strong></div><div class="metric"><span>Carboidrati</span><strong>${fmt(carbs,0)} g</strong></div><div class="metric"><span>Grassi</span><strong>${fmt(fats,0)} g</strong></div></div><div class="section"><div class="section-head"><div><h2>Piano fasi</h2><p>Letto dal foglio Pannello di controllo.</p></div></div><div class="panel phase-list">${phases.map(p=>`<div class="phase-row"><b>${esc(p.name)}</b><span>${esc(p.start)}</span><span>${esc(p.end)}</span><span>${esc(p.kcal)} kcal</span></div>`).join('')}</div></div>`}
function points(sheet,startRow,xCol,yCol){return sheet.rows.slice(startRow).map(r=>({x:r[xCol]?.text,y:clean(typeof r[yCol]?.value==='number'?r[yCol].value:parseFloat((r[yCol]?.text||'').replace(',','.')))})).filter(p=>p.x&&p.y!==null)}
function drawLine(id,pts,color){const cn=document.getElementById(id),ctx=cn.getContext('2d'),ratio=window.devicePixelRatio||1,w=cn.clientWidth,h=280;cn.width=w*ratio;cn.height=h*ratio;ctx.scale(ratio,ratio);ctx.clearRect(0,0,w,h);const pad=34;if(!pts.length){ctx.fillText('Nessun dato',20,30);return}const ys=pts.map(p=>p.y),min=Math.min(...ys),max=Math.max(...ys),range=(max-min)||1;ctx.strokeStyle='#d9ded8';ctx.lineWidth=1;for(let i=0;i<4;i++){let y=pad+i*(h-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>{let x=pad+i*((w-pad*2)/Math.max(1,pts.length-1));let y=h-pad-((p.y-min)/range)*(h-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle=color;pts.forEach((p,i)=>{let x=pad+i*((w-pad*2)/Math.max(1,pts.length-1));let y=h-pad-((p.y-min)/range)*(h-pad*2);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#66716d';ctx.font='12px Segoe UI';ctx.fillText(fmt(max,1),4,pad+4);ctx.fillText(fmt(min,1),4,h-pad+4)}
function table(sheet){const rows=sheet.rows;if(!rows.length)return'';return `<div class="table-wrap"><table><thead><tr>${rows[0].map(c=>`<th>${esc(c.text||'')}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${esc(c.text||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function pesoView(){const pts=points(peso,1,0,1);const latest=pts.at(-1);const first=pts[0];document.getElementById('view-peso').innerHTML=`<div class="section"><div class="section-head"><div><h2>Andamento peso</h2><p>Dati importati da Tabella peso.</p></div></div><div class="metrics"><div class="metric"><span>Ultimo peso</span><strong>${latest?fmt(latest.y,1):'--'} kg</strong></div><div class="metric"><span>Primo peso</span><strong>${first?fmt(first.y,1):'--'} kg</strong></div><div class="metric"><span>Variazione</span><strong>${latest&&first?fmt(latest.y-first.y,1):'--'} kg</strong></div><div class="metric"><span>Rilevazioni</span><strong>${pts.length}</strong></div></div><div class="panel"><canvas id="pesoChart"></canvas></div></div><div class="section"><h2>Tabella completa</h2>${table(peso)}</div>`;drawLine('pesoChart',pts,'#1d766f')}
function forecast(sheet,title){const pts=points(sheet,4,0,1);document.getElementById('view-'+title.toLowerCase()).innerHTML=`<div class="section"><div class="section-head"><div><h2>Previsione ${title}</h2><p>Curva ricostruita dai valori Excel.</p></div></div><div class="grid-two"><div class="panel"><canvas id="${title}Chart"></canvas></div><div class="panel">${table({rows:sheet.rows.slice(0,4)})}</div></div></div><div class="section"><h2>Dati previsione</h2>${table({rows:sheet.rows.slice(3)})}</div>`;drawLine(title+'Chart',pts,title==='Bulk'?'#b8872f':'#c45136')}
function raw(){const buttons=workbook.sheets.map((s,i)=>`<button class="${i===0?'active':''}" data-sheet="${i}">${esc(s.name)}</button>`).join('');document.getElementById('view-dati').innerHTML=`<div class="section"><div class="section-head"><div><h2>Dati Excel completi</h2><p>Tutti i fogli importati, con i valori visibili nel workbook.</p></div></div><div class="raw-tabs">${buttons}</div><div id="rawTable"></div></div>`;const rawTable=document.getElementById('rawTable');const show=i=>{document.querySelectorAll('.raw-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.sheet==i));rawTable.innerHTML=table(workbook.sheets[i])};document.querySelectorAll('.raw-tabs button').forEach(b=>b.onclick=()=>show(b.dataset.sheet));show(0)}
dashboard();pesoView();forecast(bulk,'Bulk');forecast(cut,'Cut');raw();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hide'));document.getElementById('view-'+b.dataset.view).classList.remove('hide');setTimeout(()=>{if(b.dataset.view==='peso')pesoView();if(b.dataset.view==='bulk')forecast(bulk,'Bulk');if(b.dataset.view==='cut')forecast(cut,'Cut')},20)});
</script>
