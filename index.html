<script>
const STORE='diet-dashboard-v2';const today=()=>new Date().toISOString().slice(0,10);const byName=n=>workbook.sheets.find(s=>s.name===n);const txt=(s,r,c)=>s?.rows?.[r]?.[c]?.text||'';const val=(s,r,c)=>{const v=s?.rows?.[r]?.[c]?.value;return typeof v==='number'?v:parseFloat(String(v??'').replace(',','.'))};const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));const num=v=>{const n=parseFloat(String(v??'').replace(',','.'));return Number.isFinite(n)?n:null};const fmt=(n,d=1)=>Number.isFinite(n)?n.toLocaleString('it-IT',{maximumFractionDigits:d,minimumFractionDigits:d}):'--';const dash=byName('Pannello di controllo'), pesoSheet=byName('Tabella peso'), bulk=byName('Previsione Bulk'), cut=byName('Previsione Cut');
function toIsoDate(s){const m=String(s||'').match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(!m)return s;const y=Number(m[3].length===2?'20'+m[3]:m[3]);return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`}function cellNum(r,c){return dash?.rows?.[r]?.[c]?.text||''}function excelMeasures(){const cols=[13,14,15];return cols.map(c=>({source:'Excel',date:toIsoDate(cellNum(3,c)),weight:cellNum(4,c),neck:cellNum(5,c),shoulders:cellNum(6,c),chest:cellNum(7,c),armRelaxed:cellNum(8,c),arm:cellNum(9,c),forearm:cellNum(10,c),wrist:cellNum(11,c),waist:cellNum(12,c),hips:cellNum(13,c),thigh:cellNum(14,c),ankle:cellNum(15,c),calf:cellNum(16,c),pectoral:cellNum(27,c),axillary:cellNum(28,c),triceps:cellNum(29,c),subscap:cellNum(30,c),supra:cellNum(31,c),abskin:cellNum(32,c),thighSkin:cellNum(33,c)})).filter(r=>r.date)}const importedMeasures=excelMeasures();const defaults={profile:{sex:txt(cut,2,0)||'Donna',height:val(dash,0,13)||178,age:val(dash,1,13)||31,phase:txt(dash,1,1)||'Lean Bulk - Step 1',kcal:val(dash,2,1)||2350,protein:val(dash,3,1)||125,carbs:val(dash,4,1)||287,fats:val(dash,5,1)||78},log:[],measures:importedMeasures};let state=load();function load(){try{const merged=merge(defaults,JSON.parse(localStorage.getItem(STORE)||'{}'));merged.measures=mergeImportedMeasures(merged.measures||[],importedMeasures);return merged}catch{return structuredClone(defaults)}}function mergeImportedMeasures(current,imported){const byDate=new Map(current.map(r=>[r.date,r]));for(const r of imported){if(!byDate.has(r.date))byDate.set(r.date,r)}return Array.from(byDate.values()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))}function merge(a,b){const out=structuredClone(a);for(const k in b){out[k]=Array.isArray(b[k])?b[k]:(typeof b[k]==='object'&&b[k]?merge(out[k]||{},b[k]):b[k])}return out}function save(){localStorage.setItem(STORE,JSON.stringify(state))}function sourceWeightPoints(){return (pesoSheet?.rows||[]).slice(1).map(r=>({x:r[0]?.text,y:num(r[1]?.value??r[1]?.text),source:'Excel'})).filter(p=>p.x&&p.y!==null)}function appWeightPoints(){return state.log.filter(r=>num(r.weight)!==null).map(r=>({x:r.date,y:num(r.weight),source:'App'}))}function measureWeightPoints(){return state.measures.filter(r=>num(r.weight)!==null).map(r=>({x:r.date,y:num(r.weight),source:r.source||'Misure'}))}function allWeightPoints(){return [...sourceWeightPoints(),...measureWeightPoints(),...appWeightPoints()]}function average(arr,key){const xs=arr.map(x=>num(x[key])).filter(Number.isFinite);return xs.length?xs.reduce((a,b)=>a+b,0)/xs.length:null}
document.getElementById('sourceLine').textContent='Fonte iniziale: '+workbook.sourceFile.split('\\').pop();document.getElementById('exportedAt').textContent=workbook.exportedAt;
function dashboard(){const p=state.profile;const log=state.log;const latest=log.at(-1);const weight=latest&&num(latest.weight)!==null?num(latest.weight):allWeightPoints().at(-1)?.y;const avgKcal=average(log,'kcal');const avgProtein=average(log,'protein');const phases=(dash?.rows||[]).slice(1,4).map(r=>({name:r[2]?.text,start:r[3]?.text,end:r[4]?.text,kcal:r[5]?.text})).filter(x=>x.name);document.getElementById('view-dashboard').innerHTML=`<div class="hero"><div class="status"><span class="pill">FASE CORRENTE</span><h2>${esc(p.phase)}</h2><div class="phase">${fmt(num(p.kcal),0)} kcal</div><p>Target personalizzabile. I dati inseriti da te vengono salvati nel browser e usati per aggiornare le statistiche.</p></div><div class="target"><h3>Profilo atleta</h3><div class="big">${esc(p.sex)}</div><p class="note">${fmt(num(p.height),0)} cm - ${fmt(num(p.age),0)} anni - peso ${fmt(weight,1)} kg</p><p class="note">Proteine ${fmt(num(p.protein),0)} g - Carbo ${fmt(num(p.carbs),0)} g - Grassi ${fmt(num(p.fats),0)} g</p></div></div><div class="metrics"><div class="metric"><span>Kcal medie app</span><strong>${fmt(avgKcal,0)}</strong></div><div class="metric"><span>Proteine medie</span><strong>${fmt(avgProtein,0)} g</strong></div><div class="metric"><span>Giorni registrati</span><strong>${log.length}</strong></div><div class="metric"><span>Misure salvate</span><strong>${state.measures.length}</strong></div></div><div class="grid-two"><div class="panel"><div class="section-head"><div><h2>Impostazioni dieta</h2><p>Modifica sesso, fase e target principali.</p></div></div>${profileForm()}</div><div class="panel"><h2>Piano fasi Excel</h2><div class="phase-list">${phases.map(p=>`<div class="phase-row"><b>${esc(p.name)}</b><span>${esc(p.start)}</span><span>${esc(p.end)}</span><span>${esc(p.kcal)} kcal</span></div>`).join('')}</div></div></div>`;bindProfile()}
function profileForm(){const p=state.profile;return `<div class="form-grid"><div class="field"><label>Sesso</label><select id="profile-sex"><option ${p.sex==='Donna'?'selected':''}>Donna</option><option ${p.sex==='Uomo'?'selected':''}>Uomo</option></select></div><div class="field"><label>Altezza cm</label><input id="profile-height" type="number" step="1" value="${esc(p.height)}"></div><div class="field"><label>Eta</label><input id="profile-age" type="number" step="1" value="${esc(p.age)}"></div><div class="field"><label>Fase</label><input id="profile-phase" value="${esc(p.phase)}"></div><div class="field"><label>Kcal target</label><input id="profile-kcal" type="number" step="1" value="${esc(p.kcal)}"></div><div class="field"><label>Proteine g</label><input id="profile-protein" type="number" step="1" value="${esc(p.protein)}"></div><div class="field"><label>Carboidrati g</label><input id="profile-carbs" type="number" step="1" value="${esc(p.carbs)}"></div><div class="field"><label>Grassi g</label><input id="profile-fats" type="number" step="1" value="${esc(p.fats)}"></div></div><div class="actions"><button class="btn primary" id="save-profile">Salva impostazioni</button></div>`}
function bindProfile(){document.getElementById('save-profile').onclick=()=>{state.profile={sex:document.getElementById('profile-sex').value,height:num(document.getElementById('profile-height').value)||'',age:num(document.getElementById('profile-age').value)||'',phase:document.getElementById('profile-phase').value,kcal:num(document.getElementById('profile-kcal').value)||'',protein:num(document.getElementById('profile-protein').value)||'',carbs:num(document.getElementById('profile-carbs').value)||'',fats:num(document.getElementById('profile-fats').value)||''};save();render()}}
function registro(){document.getElementById('view-registro').innerHTML=`<div class="section"><div class="section-head"><div><h2>Registro alimentazione</h2><p>Aggiungi giornate, peso, calorie, macro e note.</p></div></div><div class="panel">${logForm()}</div></div><div class="section"><div class="grid-two"><div class="panel"><canvas id="weightChart"></canvas></div><div class="panel"><canvas id="kcalChart"></canvas></div></div></div><div class="section"><h2>Giorni salvati</h2>${logTable()}</div>`;bindLog();drawLine('weightChart',allWeightPoints(),'#1d766f','Peso kg');drawLine('kcalChart',state.log.map(r=>({x:r.date,y:num(r.kcal)})).filter(p=>p.y!==null),'#c45136','Kcal')}
function logForm(){return `<div class="form-grid"><div class="field"><label>Data</label><input id="log-date" type="date" value="${today()}"></div><div class="field"><label>Peso kg</label><input id="log-weight" type="number" step="0.1"></div><div class="field"><label>Kcal</label><input id="log-kcal" type="number" step="1"></div><div class="field"><label>Proteine g</label><input id="log-protein" type="number" step="1"></div><div class="field"><label>Carboidrati g</label><input id="log-carbs" type="number" step="1"></div><div class="field"><label>Grassi g</label><input id="log-fats" type="number" step="1"></div><div class="field"><label>Allenamento</label><input id="log-workout"></div><div class="field"><label>Note</label><textarea id="log-notes"></textarea></div></div><div class="actions"><button class="btn primary" id="add-log">Aggiungi giornata</button></div>`}
function bindLog(){document.getElementById('add-log').onclick=()=>{state.log.push({date:document.getElementById('log-date').value||today(),weight:document.getElementById('log-weight').value,kcal:document.getElementById('log-kcal').value,protein:document.getElementById('log-protein').value,carbs:document.getElementById('log-carbs').value,fats:document.getElementById('log-fats').value,workout:document.getElementById('log-workout').value,notes:document.getElementById('log-notes').value});state.log.sort((a,b)=>a.date.localeCompare(b.date));save();render()};document.querySelectorAll('[data-del-log]').forEach(b=>b.onclick=()=>{state.log.splice(Number(b.dataset.delLog),1);save();render()})}
function logTable(){if(!state.log.length)return '<div class="empty">Ancora nessuna giornata inserita.</div>';return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Peso</th><th>Kcal</th><th>Macro</th><th>Allenamento</th><th>Note</th><th></th></tr></thead><tbody>${state.log.map((r,i)=>`<tr><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${esc(r.kcal)}</td><td>P ${esc(r.protein)} / C ${esc(r.carbs)} / G ${esc(r.fats)}</td><td>${esc(r.workout)}</td><td>${esc(r.notes)}</td><td><button class="btn danger small" data-del-log="${i}">Elimina</button></td></tr>`).join('')}</tbody></table></div>`}
function misure(){document.getElementById('view-misure').innerHTML=`<div class="section"><div class="section-head"><div><h2>Pliche e circonferenze</h2><p>Registra misure con data. La BF stimata usa sesso, altezza, collo, vita e fianchi quando disponibili.</p></div></div><div class="panel">${measureForm()}</div></div><div class="section"><div class="grid-two"><div class="panel"><canvas id="bfChart"></canvas></div><div class="panel"><canvas id="waistChart"></canvas></div></div></div><div class="section"><h2>Storico misure</h2>${measureTable()}</div>`;bindMeasures();drawLine('bfChart',state.measures.map(r=>({x:r.date,y:bodyFat(r)})).filter(p=>p.y!==null),'#b8872f','BF stimata %');drawLine('waistChart',state.measures.map(r=>({x:r.date,y:num(r.waist)})).filter(p=>p.y!==null),'#1d766f','Vita cm')}
function measureForm(){return `<div class="form-grid"><div class="field"><label>Data</label><input id="m-date" type="date" value="${today()}"></div><div class="field"><label>Peso kg</label><input id="m-weight" type="number" step="0.1"></div><div class="field"><label>Collo cm</label><input id="m-neck" type="number" step="0.1"></div><div class="field"><label>Vita cm</label><input id="m-waist" type="number" step="0.1"></div><div class="field"><label>Fianchi cm</label><input id="m-hips" type="number" step="0.1"></div><div class="field"><label>Spalle cm</label><input id="m-shoulders" type="number" step="0.1"></div><div class="field"><label>Torace cm</label><input id="m-chest" type="number" step="0.1"></div><div class="field"><label>Bicipite rilassato cm</label><input id="m-armRelaxed" type="number" step="0.1"></div><div class="field"><label>Bicipite contratto cm</label><input id="m-arm" type="number" step="0.1"></div><div class="field"><label>Avambraccio cm</label><input id="m-forearm" type="number" step="0.1"></div><div class="field"><label>Polso cm</label><input id="m-wrist" type="number" step="0.1"></div><div class="field"><label>Coscia cm</label><input id="m-thigh" type="number" step="0.1"></div><div class="field"><label>Polpaccio cm</label><input id="m-calf" type="number" step="0.1"></div><div class="field"><label>Caviglia cm</label><input id="m-ankle" type="number" step="0.1"></div><div class="field"><label>Plica pettorale mm</label><input id="m-pectoral" type="number" step="0.1"></div><div class="field"><label>Plica ascellare mm</label><input id="m-axillary" type="number" step="0.1"></div><div class="field"><label>Plica tricipite mm</label><input id="m-triceps" type="number" step="0.1"></div><div class="field"><label>Plica sottoscapolare mm</label><input id="m-subscap" type="number" step="0.1"></div><div class="field"><label>Plica sovrailiaca mm</label><input id="m-supra" type="number" step="0.1"></div><div class="field"><label>Plica addome mm</label><input id="m-abskin" type="number" step="0.1"></div><div class="field"><label>Plica coscia mm</label><input id="m-thighSkin" type="number" step="0.1"></div></div><div class="actions"><button class="btn primary" id="add-measure">Aggiungi misure</button></div>`}
function bindMeasures(){document.getElementById('add-measure').onclick=()=>{state.measures.push({source:'App',date:document.getElementById('m-date').value||today(),weight:document.getElementById('m-weight').value,neck:document.getElementById('m-neck').value,waist:document.getElementById('m-waist').value,hips:document.getElementById('m-hips').value,shoulders:document.getElementById('m-shoulders').value,chest:document.getElementById('m-chest').value,armRelaxed:document.getElementById('m-armRelaxed').value,arm:document.getElementById('m-arm').value,forearm:document.getElementById('m-forearm').value,wrist:document.getElementById('m-wrist').value,thigh:document.getElementById('m-thigh').value,calf:document.getElementById('m-calf').value,ankle:document.getElementById('m-ankle').value,pectoral:document.getElementById('m-pectoral').value,axillary:document.getElementById('m-axillary').value,triceps:document.getElementById('m-triceps').value,subscap:document.getElementById('m-subscap').value,supra:document.getElementById('m-supra').value,abskin:document.getElementById('m-abskin').value,thighSkin:document.getElementById('m-thighSkin').value});state.measures.sort((a,b)=>a.date.localeCompare(b.date));save();render()};document.querySelectorAll('[data-del-measure]').forEach(b=>b.onclick=()=>{state.measures.splice(Number(b.dataset.delMeasure),1);save();render()})}
function bodyFat(r){const toIn=x=>x/2.54;const h=toIn(num(state.profile.height)),neck=toIn(num(r.neck)),waist=toIn(num(r.waist)),hips=toIn(num(r.hips));if(!h||!neck||!waist)return null;if(state.profile.sex==='Uomo'){const x=waist-neck;if(x<=0)return null;return 86.01*Math.log10(x)-70.041*Math.log10(h)+36.76}if(!hips)return null;const x=waist+hips-neck;if(x<=0)return null;return 163.205*Math.log10(x)-97.684*Math.log10(h)-78.387}
function skinSum(r){return ['pectoral','axillary','triceps','subscap','supra','abskin','thighSkin'].map(k=>num(r[k])).filter(Number.isFinite).reduce((a,b)=>a+b,0)}
function measureTable(){if(!state.measures.length)return '<div class="empty">Ancora nessuna misurazione inserita.</div>';return `<div class="table-wrap"><table><thead><tr><th>Fonte</th><th>Data</th><th>Peso</th><th>BF stimata</th><th>Collo</th><th>Vita</th><th>Fianchi</th><th>Spalle</th><th>Torace</th><th>Bicipite</th><th>Avambraccio</th><th>Polso</th><th>Coscia</th><th>Polpaccio</th><th>Somma pliche</th><th></th></tr></thead><tbody>${state.measures.map((r,i)=>`<tr><td>${esc(r.source||'App')}</td><td>${esc(r.date)}</td><td>${esc(r.weight)}</td><td>${fmt(bodyFat(r),1)}%</td><td>${esc(r.neck)}</td><td>${esc(r.waist)}</td><td>${esc(r.hips)}</td><td>${esc(r.shoulders)}</td><td>${esc(r.chest)}</td><td>${esc(r.arm)}</td><td>${esc(r.forearm)}</td><td>${esc(r.wrist)}</td><td>${esc(r.thigh)}</td><td>${esc(r.calf)}</td><td>${fmt(skinSum(r),1)} mm</td><td><button class="btn danger small" data-del-measure="${i}">Elimina</button></td></tr>`).join('')}</tbody></table></div>`}
function points(sheet,startRow,xCol,yCol){return sheet.rows.slice(startRow).map(r=>({x:r[xCol]?.text,y:num(r[yCol]?.value??r[yCol]?.text)})).filter(p=>p.x&&p.y!==null)}
function drawLine(id,pts,color,label){const cn=document.getElementById(id);if(!cn)return;const ctx=cn.getContext('2d'),ratio=window.devicePixelRatio||1,w=cn.clientWidth,h=280;cn.width=w*ratio;cn.height=h*ratio;ctx.scale(ratio,ratio);ctx.clearRect(0,0,w,h);const pad=36;ctx.fillStyle='#66716d';ctx.font='12px Segoe UI';ctx.fillText(label||'',pad,18);if(!pts.length){ctx.fillText('Nessun dato',pad,45);return}const ys=pts.map(p=>p.y),min=Math.min(...ys),max=Math.max(...ys),range=(max-min)||1;ctx.strokeStyle='#d9ded8';ctx.lineWidth=1;for(let i=0;i<4;i++){let y=pad+i*(h-pad*2)/3;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>{let x=pad+i*((w-pad*2)/Math.max(1,pts.length-1));let y=h-pad-((p.y-min)/range)*(h-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle=color;pts.forEach((p,i)=>{let x=pad+i*((w-pad*2)/Math.max(1,pts.length-1));let y=h-pad-((p.y-min)/range)*(h-pad*2);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#66716d';ctx.fillText(fmt(max,1),4,pad+4);ctx.fillText(fmt(min,1),4,h-pad+4)}
function forecast(sheet,title){const pts=points(sheet,4,0,1);const conf=sheet.rows[1].map((c,i)=>({label:c.text,value:sheet.rows[2]?.[i]?.text})).filter(x=>x.label&&x.value);const rows=sheet.rows.slice(3).map(r=>r.slice(0,5));document.getElementById('view-'+title.toLowerCase()).innerHTML=`<div class="section"><div class="section-head"><div><h2>Previsione ${title}</h2><p>Pulita dai blocchi strani del foglio: qui restano solo configurazione utile e curva.</p></div></div><div class="grid-two"><div class="panel"><canvas id="${title}Chart"></canvas></div><div class="panel"><h2>Configurazione</h2><div class="forecast-summary">${conf.map(x=>`<div><span>${esc(x.label)}</span><b>${esc(x.value)}</b></div>`).join('')}</div></div></div></div><div class="section"><h2>Tabella previsione</h2>${table({rows})}</div>`;drawLine(title+'Chart',pts,title==='Bulk'?'#b8872f':'#c45136','Peso stimato kg')}
function table(sheet){const rows=sheet.rows;if(!rows.length)return'';return `<div class="table-wrap"><table><thead><tr>${rows[0].map(c=>`<th>${esc(c.text||'')}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${esc(c.text||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function render(){dashboard();registro();misure()}render();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hide'));document.getElementById('view-'+b.dataset.view).classList.remove('hide');setTimeout(render,20)});window.addEventListener('resize',()=>{const active=document.querySelector('.tab.active')?.dataset.view;if(active==='registro'||active==='misure')render()});
</script>
</body>
</html>
